name: Extract and Deploy

on:
  push:
    branches: [main]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Extract ZIP file
        run: unzip -q iris-bot\ 2.zip -d ./extracted
      - name: Copy extracted files to root
        run: |
          if [ -d "extracted" ]; then
            ls -la extracted/
            cp -r extracted/* .
            rm -rf extracted iris-bot\ 2.zip
          fi
      - name: Commit extracted files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Extract iris-bot project files" || echo "No changes to commit"
          git push
