name: Extract and Deploy

on:
  push:
    branches: [main]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Extract ZIP
        run: unzip "iris-bot 2.zip" -d ./extracted
      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: extracted-files
          path: ./extracted
